services:
  nginx:
    image: nginx:alpine
    ports:
      - "3008:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gui
    networks:
      - redfish-net

  gui:
    build:
      context: ./gui
      dockerfile: Dockerfile.dev
    volumes:
      - ./gui/src:/app/src
    env_file:
      - path: ./gui/.env.local
        required: false
    networks:
      - redfish-net

networks:
  redfish-net:
    external: true
