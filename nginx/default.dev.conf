server {
    listen 80;

    location /api/proxy/emu/ {
        proxy_pass         http://redfish-emu:8008/;
        proxy_redirect     off;
        proxy_set_header   Host $proxy_host;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    location /api/proxy/ras-emu/ {
        proxy_pass         http://redfish-ras-emu:8009/;
        proxy_redirect     off;
        proxy_set_header   Host $proxy_host;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Next.js dev server — WebSocket upgrade for HMR
    location / {
        proxy_pass         http://gui:3009;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
